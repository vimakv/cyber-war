<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        a {
            color: #00ff00;
            margin-right: 15px;
            text-decoration: none;
        }

        .box {
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background: #010101;
        }

        .url {
            color: #00ffff;
            font-weight: bold;
        }

        pre {
            color: #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .high {
            color: red;
            font-weight: bold;
        }

        .low {
            color: lightgreen;
            font-weight: bold;
        }

        hr {
            border-color: #00ff00;
        }
    </style>
</head>

<body>

<h2>> CYBER WAR DASHBOARD</h2>

<a href="/scanner">[ Start Scan ]</a>
<a href="/logout">[ Logout ]</a>

<hr>

{% if scans %}
    {% for scan in scans %}
        <div class="box">

            <p>> URL: <span class="url">{{ scan[1] }}</span></p>

            <pre>
{{ scan[2] }}
            </pre>

        </div>
    {% endfor %}
{% else %}
    <p>> No scans yet...</p>
{% endif %}

</body>
</html>
