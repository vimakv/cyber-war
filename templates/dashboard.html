<!DOCTYPE html>
<html>
<head>
<title>Cyber War Dashboard</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e3f2fd,#ffffff);
}

/* CARD */
.card {
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    color:#007bff;
    margin-bottom:20px;
}

/* BUTTONS */
a {
    display:block;
    margin:12px 0;
    padding:12px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

a:hover {
    background:#0056b3;
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">
    <h2>⚔️ Cyber War</h2>

    <p style="margin-bottom:20px;">Welcome {{ session['user'] }}</p>

    <a href="/scanner">🔍 Go to Scanner</a>
    <a href="/profile">👤 Profile</a>
    <a href="/logout">🚪 Logout</a>
</div>

</body>
</html>
