<!DOCTYPE html>
<html>
<head>
<title>Cyber War Register</title>

<style>
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
    font-family:'Segoe UI';
}

.card {
    background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

h2 {
    text-align:center;
    color:#007bff;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#0056b3;
}

/* Validation text */
.valid {
    color:green;
}
.invalid {
    color:red;
}
</style>

<script>
function validatePassword() {
    let p = document.getElementById("password").value;

    document.getElementById("len").className =
        (p.length >= 6 && p.length <= 12) ? "valid" : "invalid";

    document.getElementById("upper").className =
        /[A-Z]/.test(p) ? "valid" : "invalid";

    document.getElementById("lower").className =
        /[a-z]/.test(p) ? "valid" : "invalid";

    document.getElementById("special").className =
        /[!@#$%^&*]/.test(p) ? "valid" : "invalid";
}
</script>

</head>

<body>

<div class="card">
<h2>⚔️ Register</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="email" type="email" placeholder="Email" required>

<input type="password" id="password" name="password"
       placeholder="Password" onkeyup="validatePassword()" required>

<input type="password" name="confirm_password"
       placeholder="Confirm Password" required>

<button>Create Account</button>

</form>

<!-- Password Rules -->
<div style="margin-top:10px;">
<p id="len" class="invalid">✔ 6-12 characters</p>
<p id="upper" class="invalid">✔ One uppercase</p>
<p id="lower" class="invalid">✔ One lowercase</p>
<p id="special" class="invalid">✔ One special character</p>
</div>

</div>

</body>
</html>
