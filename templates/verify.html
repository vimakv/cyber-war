<!DOCTYPE html>
<html>
<head>
<title>Verify OTP - Cyber War</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    animation: fadeIn 0.6s ease;
}

/* TITLE */
h2 {
    color: #007bff;
    margin-bottom: 10px;
}

/* SUBTEXT */
p {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
    font-size: 16px;
    letter-spacing: 3px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#007bff,#00c6ff);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* BACK LINK */
a {
    display: block;
    margin-top: 15px;
    color: #007bff;
    text-decoration: none;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h2>🔐 Verify OTP</h2>
    <p>Enter the OTP sent to your email</p>

    <form method="POST">
        <input name="otp" placeholder="Enter 6-digit OTP" required>
        <button>Verify</button>
    </form>

    <a href="/register">← Back to Register</a>
</div>

</body>
</html>
