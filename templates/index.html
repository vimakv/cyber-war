<!DOCTYPE html>
<html>
<head>
<title>Cyber War Terminal</title>

<style>
body {
    background:black;
    color:#00ff9f;
    font-family:monospace;
    padding:20px;
}

/* TERMINAL BOX */
.terminal {
    border:1px solid #00ff9f;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 20px #00ff9f;
}

/* INPUT */
input {
    width:80%;
    padding:10px;
    background:black;
    border:1px solid #00ff9f;
    color:#00ff9f;
}

/* BUTTON */
button {
    padding:10px;
    background:#00ff9f;
    border:none;
    cursor:pointer;
}

/* OUTPUT */
.output {
    margin-top:20px;
    white-space:pre-line;
}
</style>

<script>
function typeEffect(text, id) {
    let i = 0;
    let speed = 20;
    let elem = document.getElementById(id);
    elem.innerHTML = "";

    function type() {
        if (i < text.length) {
            elem.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}
</script>

</head>

<body>

<div class="terminal">

<h3>⚔️ CYBER WAR TERMINAL</h3>

<form method="POST">
<input name="url" placeholder="Enter target URL" required>
<button>SCAN</button>
</form>

{% if result %}

<div class="output" id="out"></div>

<script>
let data = `
{% for k,v in result.items() %}
{{ k }} : {{ v }}
{% endfor %}
`;

typeEffect(data, "out");
</script>

{% endif %}

</div>

</body>
</html>
