<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }

        input, button {
            background: black;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            margin-top: 5px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .result-box {
            border: 1px solid #00ff00;
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .vuln {
            color: red;
            font-weight: bold;
        }

        .safe {
            color: lightgreen;
            font-weight: bold;
        }

        .warn {
            color: orange;
            font-weight: bold;
        }

        .ai-box {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed #00ff00;
        }

        a button {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>> VULNERABILITY SCANNER</h2>

<form method="POST">
    <input type="text" name="url" placeholder="Enter URL" required>
    <br>
    <button type="submit">Start Scan</button>
</form>

<p id="status">Status: Idle</p>

<div id="result" class="result-box"></div>

<a href="/report">
    <button>⬇️ Download Report</button>
</a>

<script>
setInterval(async () => {

    let res = await fetch('/status');
    let data = await res.json();

    document.getElementById("status").innerText = "Status: " + data.status;

    if (data.status.includes("Completed")) {

        let r = await fetch('/latest');
        let result = await r.json();

        if (result.result) {

            let html = `<h3>> ${result.url}</h3>`;

            let aiText = "";

            for (let key in result.result) {

                let value = result.result[key];

                // Handle AI separately
                if (key === "AI") {
                    aiText = value;
                    continue;
                }

                let status = (typeof value === "object") ? value.status : value;

                let cls = "safe";
                let icon = "🟢";

                if (status === "Vulnerable") {
                    cls = "vuln";
                    icon = "🔴";
                } 
                else if (status === "Possible" || status === "Warning") {
                    cls = "warn";
                    icon = "🟡";
                }

                html += `<p>${key} → ${icon} <span class="${cls}">${status}</span></p>`;
            }

            // AI Section
            if (aiText) {
                html += `
                    <div class="ai-box">
                        <b>🤖 AI Analysis:</b>
                        <p>${aiText}</p>
                    </div>
                `;
            }

            document.getElementById("result").innerHTML = html;
        }
    }

}, 1500);
</script>

</body>
</html>
