<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            border: 1px solid #00ff00;
            padding: 30px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 15px #00ff00;
        }

        h2 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
            outline: none;
        }

        .password-box {
            position: relative;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            color: #00ff00;
        }

        .remember {
            display: flex;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
        }

        button:hover {
            background: #00ff00;
            color: black;
        }

        /* 🔄 Loading */
        .loader {
            display: none;
            margin-top: 10px;
        }

        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            margin: 3px;
            animation: blink 1s infinite;
        }

        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
        }

        a {
            color: #00ff00;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="POST" action="/login" onsubmit="showLoader()">
        <input type="text" name="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <div class="remember">
            <input type="checkbox" name="remember">
            <label>Remember Me</label>
        </div>

        <button type="submit">Login</button>

        <div class="loader" id="loader">
            <span></span><span></span><span></span>
        </div>
    </form>

    <div class="link">
        Don’t have an account? <a href="/register">Register</a>
    </div>
</div>

<script>
    function togglePassword() {
        let pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text" : "password";
    }

    function showLoader() {
        document.getElementById("loader").style.display = "block";
    }
</script>

</body>
</html>
