<!DOCTYPE html>
<html>
<head>
<title>Cyber War Profile</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card {
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,255,159,0.3);
}

/* TITLE */
h2 {
    color:#00ff9f;
    margin-bottom:20px;
}

/* PROFILE ICON */
.avatar {
    font-size:60px;
    margin-bottom:10px;
}

/* INFO BOX */
.info {
    margin:15px 0;
    padding:10px;
    border-radius:8px;
    background:rgba(255,255,255,0.08);
}

/* BUTTONS */
.btn {
    display:inline-block;
    margin-top:15px;
    padding:10px 15px;
    border-radius:8px;
    background:linear-gradient(45deg,#00ff9f,#00adb5);
    color:black;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

.logout {
    background:#ef4444;
    color:white;
    margin-left:10px;
}
</style>
</head>

<body>

<div class="card">

    <div class="avatar">👤</div>

    <h2>Cyber War Profile</h2>

    <div class="info">
        <strong>Username:</strong><br>
        {{ username }}
    </div>

    <div class="info">
        <strong>Email:</strong><br>
        {{ email }}
    </div>

    <div>
        <a href="/dashboard" class="btn">⬅ Dashboard</a>
        <a href="/logout" class="btn logout">Logout</a>
    </div>

</div>

</body>
</html>
